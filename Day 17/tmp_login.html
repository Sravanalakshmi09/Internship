<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SignalSense | Login</title>

    <link rel="stylesheet" href="/static/css/home.css">
    <link rel="stylesheet" href="/static/css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- Animated Background -->

    <div id="bg"></div>

    <!-- Cursor Glow -->

    <div id="cursor"></div>
    <!-- Site header (match homepage) -->
    <header class="site-header">
        <div class="logo">SignalSense</div>
        <nav class="site-nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/prediction">Predict</a>
            <a href="/history">History</a>
            <a href="/login">Login</a>
        </nav>
        <a class="cta-btn" href="/login">Login</a>
    </header>

    <!-- Creative two-column login layout -->
    <div class="login-creative">

        <div class="creative-panel">
            <h2>Welcome Back</h2>
            <p>Sign in to access your SignalSense dashboard — monitor devices and detect anomalies in real time.</p>
            <div class="features">
                <div class="feature">Realtime alerts</div>
                <div class="feature">Easy predictions</div>
                <div class="feature">Secure sessions</div>
            </div>
            <div class="decor-blobs">
                <span class="blob b1"></span>
                <span class="blob b2"></span>
            </div>
        </div>

        <div class="login-container">

            <div class="login-card">

                <h1>SignalSense</h1>

                <p>IoT Anomaly Detection System</p>

                <form id="loginForm">

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Email Address"
                            required
                        >

                    </div>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Password"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="login-btn"
                    >

                        Login

                    </button>

                </form>

                <div class="links">

                    <a href="/register">Create Account</a>

                </div>

                <p id="message" class="message"></p>

            </div>

        </div>

    </div>

    <script src="/static/js/background.js"></script>

    <script src="/static/js/login.js"></script>

</body>

</html>
