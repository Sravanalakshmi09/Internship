<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SignalSense | Forgot Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div id="bg"></div>

<div id="cursor"></div>

<div class="login-container">

    <div class="login-card">

        <h1>Forgot Password</h1>

        <p>Reset your password using OTP</p>

        <form id="forgotForm">

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email"
                    required>

            </div>

            <button
                type="button"
                id="sendOtpBtn"
                class="login-btn">

                Send OTP

            </button>

            <br><br>

            <div class="input-box">

                <i class="fa-solid fa-key"></i>

                <input
                    type="text"
                    id="otp"
                    placeholder="Enter OTP"
                    maxlength="6"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="New Password"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

            </div>

            <button
                type="submit"
                class="login-btn">

                Reset Password

            </button>

        </form>

        <div class="links">

            <a href="/">Back to Login</a>

        </div>

        <p
            id="message"
            class="message">
        </p>

    </div>

</div>

<script src="{{ url_for('static', filename='js/background.js') }}"></script>

<script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>

</body>

</html>
