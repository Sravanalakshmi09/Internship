<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SignalSense | Profile</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/dashboard.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div id="bg"></div>
<div id="cursor"></div>

<div class="sidebar">

<div class="logo">
<h2>SignalSense</h2>
</div>

<ul>

<li>
<a href="/dashboard">
<i class="fa-solid fa-house"></i>
Dashboard
</a>
</li>

<li>
<a href="/prediction">
<i class="fa-solid fa-microchip"></i>
Prediction
</a>
</li>

<li>
<a href="/history">
<i class="fa-solid fa-clock-rotate-left"></i>
History
</a>
</li>

<li class="active">
<a href="/profile">
<i class="fa-solid fa-user"></i>
Profile
</a>
</li>

<li>
<a href="/logout">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>
</li>

</ul>

</div>

<div class="main">

<div class="navbar">

<h2>My Profile</h2>

<div class="profile">

<i class="fa-solid fa-user-circle"></i>

<span>{{ session['user_name'] }}</span>

</div>

</div>

<div class="card profile-card">

<div class="profile-image">

<img src="{{ url_for('static', filename='images/profile.png') }}"
id="profilePreview">

<label for="profilePic">

<i class="fa-solid fa-camera"></i>

</label>

<input
type="file"
id="profilePic"
accept="image/*"
hidden>

</div>

<form id="profileForm">

<div class="input-box">

<input
type="text"
id="name"
value="{{ session['user_name'] }}"
placeholder="Full Name">

</div>

<div class="input-box">

<input
type="email"
id="email"
value="{{ session['user_email'] }}"
readonly>

</div>

<div class="input-box">

<input
type="password"
id="password"
placeholder="New Password">

</div>

<div class="input-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

</div>

<button
class="predict-btn"
type="submit">

Update Profile

</button>

</form>

<p id="message"></p>

</div>

</div>

<script src="{{ url_for('static', filename='js/background.js') }}"></script>

<script src="{{ url_for('static', filename='js/profile.js') }}"></script>

</body>

</html>
