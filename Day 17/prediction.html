<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SignalSense | Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div id="bg"></div>
<div id="cursor"></div>

<!-- Sidebar -->

<div class="sidebar">

    <div class="logo">

        <h2>SignalSense</h2>

    </div>

    <ul>

        <li>
            <a href="/dashboard">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>
        </li>

        <li class="active">
            <a href="/prediction">
                <i class="fa-solid fa-microchip"></i>
                Prediction
            </a>
        </li>

        <li>
            <a href="/history">
                <i class="fa-solid fa-clock-rotate-left"></i>
                History
            </a>
        </li>

        <li>
            <a href="/logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </li>

    </ul>

</div>

<!-- Main -->

<div class="main">

    <div class="navbar">

        <h2>IoT Prediction</h2>

        <div class="profile">

            <i class="fa-solid fa-user"></i>

            <span>{{ session['user_name'] }}</span>

        </div>

    </div>

    <div class="welcome">

        <h1>Predict Device Status</h1>

        <p>

            Enter the IoT sensor values below.

        </p>

        <form id="predictionForm">

            <div class="input-box">

                <i class="fa-solid fa-microchip"></i>

                <input
                    type="text"
                    id="device_id"
                    placeholder="Device ID"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-temperature-half"></i>

                <input
                    type="number"
                    step="0.01"
                    id="temperature"
                    placeholder="Temperature"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-droplet"></i>

                <input
                    type="number"
                    step="0.01"
                    id="humidity"
                    placeholder="Humidity"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-battery-three-quarters"></i>

                <input
                    type="number"
                    step="0.01"
                    id="battery_level"
                    placeholder="Battery Level"
                    required>

            </div>

            <button
                class="predict-btn"
                type="submit">

                Predict

            </button>

        </form>

    </div>

    <br>

    <!-- Result -->

    <div class="card">

        <h2>Prediction Result</h2>

        <br>

        <h3>

            Device ID :
            <span id="deviceResult">-</span>

        </h3>

        <br>

        <h3>

            Prediction :
            <span id="predictionResult">-</span>

        </h3>

        <br>

        <h3>

            Confidence :
            <span id="confidenceResult">-</span>

        </h3>

    </div>

</div>

<script src="{{ url_for('static', filename='js/background.js') }}"></script>

<script src="{{ url_for('static', filename='js/prediction.js') }}"></script>

</body>

</html>
